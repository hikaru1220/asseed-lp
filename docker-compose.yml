services:
  # 開発用: Vite devサーバー
  dev:
    image: node:20-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npx vite --host 0.0.0.0 --port 3000"
    profiles:
      - dev

  # 本番プレビュー: nginx + ビルド済みファイル
  preview:
    build: .
    ports:
      - "8888:80"
    profiles:
      - preview

volumes:
  node_modules:
